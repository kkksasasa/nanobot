<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐂🐎 牛马 Stream 测试 - 带思考过程</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px 30px;
    }
    .header h1 { font-size: 24px; margin-bottom: 5px; }
    .header p { opacity: 0.9; font-size: 14px; }
    
    .events-panel {
      background: #1e1e1e;
      color: #d4d4d4;
      padding: 15px;
      max-height: 300px;
      overflow-y: auto;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 13px;
      border-bottom: 3px solid #667eea;
    }
    .event {
      margin-bottom: 8px;
      padding: 8px;
      border-radius: 5px;
      border-left: 3px solid #667eea;
    }
    .event.thinking {
      background: rgba(255, 193, 7, 0.2);
      border-left-color: #ffc107;
    }
    .event.tool_call {
      background: rgba(33, 150, 243, 0.2);
      border-left-color: #2196f3;
    }
    .event.tool_result {
      background: rgba(76, 175, 80, 0.2);
      border-left-color: #4caf50;
    }
    .event.chunk {
      background: rgba(156, 39, 176, 0.2);
      border-left-color: #9c27b0;
    }
    .event.complete {
      background: rgba(76, 175, 80, 0.3);
      border-left-color: #4caf50;
    }
    .event.error {
      background: rgba(244, 67, 54, 0.2);
      border-left-color: #f44336;
    }
    .event-type {
      font-weight: bold;
      color: #fff;
      margin-bottom: 4px;
    }
    .event-content {
      white-space: pre-wrap;
      word-break: break-word;
    }
    .event-meta {
      font-size: 11px;
      color: #888;
      margin-top: 4px;
    }
    
    .chat-box {
      height: 200px;
      overflow-y: auto;
      padding: 20px;
      background: #f8f9fa;
    }
    .message {
      margin-bottom: 15px;
      padding: 12px 16px;
      border-radius: 12px;
      max-width: 80%;
      word-wrap: break-word;
    }
    .user {
      background: #667eea;
      color: white;
      margin-left: auto;
      border-bottom-right-radius: 4px;
    }
    .assistant {
      background: white;
      color: #333;
      margin-right: auto;
      border-bottom-left-radius: 4px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    
    .input-area {
      padding: 20px;
      background: white;
      border-top: 1px solid #e9ecef;
      display: flex;
      gap: 10px;
    }
    input[type="text"] {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e9ecef;
      border-radius: 25px;
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus {
      border-color: #667eea;
    }
    button {
      padding: 12px 30px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 25px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s;
    }
    button:hover {
      transform: translateY(-2px);
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    .status {
      padding: 8px 20px;
      background: #fff3cd;
      color: #856404;
      font-size: 13px;
    }
    .status.healthy {
      background: #d4edda;
      color: #155724;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🐂🐎 牛马 Stream 测试</h1>
      <p>实时显示思考过程、工具调用、回复内容</p>
    </div>
    
    <div class="status" id="status">检查服务状态...</div>
    
    <div class="events-panel" id="eventsPanel">
      <div style="color: #888; padding: 10px;">事件流将显示在这里...</div>
    </div>
    
    <div class="chat-box" id="chatBox">
      <div class="message assistant">
        你好！我是牛马 🐂🐎，试试问我问题，我会展示思考过程哦~
      </div>
    </div>
    
    <div class="input-area">
      <input 
        type="text" 
        id="input" 
        placeholder="输入消息..." 
        onkeypress="if(event.key==='Enter') sendMessage()"
      >
      <button onclick="sendMessage()" id="sendBtn">发送</button>
    </div>
  </div>

  <script>
    const API_BASE = 'http://localhost:8001';
    let sessionId = 'web:' + Math.random().toString(36).substr(2, 9);
    let eventSource = null;
    
    // 检查服务状态
    async function checkStatus() {
      try {
        const res = await fetch(`${API_BASE}/health`);
        const data = await res.json();
        const statusEl = document.getElementById('status');
        if (data.status === 'healthy') {
          statusEl.textContent = '✅ 服务正常 - ' + data.service;
          statusEl.className = 'status healthy';
        } else {
          statusEl.textContent = '⚠️ 服务异常';
        }
      } catch (e) {
        document.getElementById('status').textContent = '❌ 无法连接服务，请确保已启动';
      }
    }
    
    // 添加事件到面板
    function addEvent(type, content, metadata = null) {
      const panel = document.getElementById('eventsPanel');
      const div = document.createElement('div');
      div.className = `event ${type}`;
      
      const typeLabels = {
        'start': '🚀 开始',
        'thinking': '💭 思考',
        'tool_call': '🔧 工具调用',
        'tool_result': '✅ 工具结果',
        'chunk': '💬 回复',
        'complete': '✓ 完成',
        'error': '❌ 错误'
      };
      
      div.innerHTML = `
        <div class="event-type">${typeLabels[type] || type}</div>
        <div class="event-content">${escapeHtml(content || '')}</div>
        ${metadata ? `<div class="event-meta">${JSON.stringify(metadata)}</div>` : ''}
      `;
      
      panel.appendChild(div);
      panel.scrollTop = panel.scrollHeight;
    }
    
    // 添加消息到聊天框
    function addMessage(text, isUser) {
      const chatBox = document.getElementById('chatBox');
      const div = document.createElement('div');
      div.className = `message ${isUser ? 'user' : 'assistant'}`;
      div.textContent = text;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
    }
    
    // 发送消息
    async function sendMessage() {
      const input = document.getElementById('input');
      const sendBtn = document.getElementById('sendBtn');
      const message = input.value.trim();
      
      if (!message) return;
      
      // 添加用户消息
      addMessage(message, true);
      input.value = '';
      sendBtn.disabled = true;
      
      // 清空事件面板
      const panel = document.getElementById('eventsPanel');
      panel.innerHTML = '';
      
      // 关闭之前的连接
      if (eventSource) {
        eventSource.close();
      }
      
      // 发起 SSE 请求
      const url = `${API_BASE}/chat/stream?message=${encodeURIComponent(message)}&session_id=${sessionId}`;
      eventSource = new EventSource(url);
      
      let fullResponse = '';
      
      eventSource.onmessage = (event) => {
        const data = JSON.parse(event.data);
        
        // 添加到事件面板
        addEvent(data.type, data.content, data.metadata);
        
        // 处理不同类型的事件
        if (data.type === 'chunk') {
          fullResponse += data.content;
          // 更新聊天框（简化处理，实际应该增量更新）
          const lastMsg = document.querySelector('.chat-box .assistant:last-child');
          if (lastMsg) {
            lastMsg.textContent = fullResponse;
          } else {
            addMessage(fullResponse, false);
          }
        } else if (data.type === 'complete' || data.type === 'error') {
          eventSource.close();
          sendBtn.disabled = false;
          input.focus();
        }
      };
      
      eventSource.onerror = (err) => {
        console.error('SSE Error:', err);
        addEvent('error', '连接错误');
        eventSource.close();
        sendBtn.disabled = false;
      };
    }
    
    // HTML 转义
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    // 页面加载时检查状态
    checkStatus();
  </script>
</body>
</html>
