<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐂🐎 牛马聊天测试</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px 30px;
      text-align: center;
    }
    .header h1 { font-size: 24px; margin-bottom: 5px; }
    .header p { opacity: 0.9; font-size: 14px; }
    .chat-box {
      height: 400px;
      overflow-y: auto;
      padding: 20px;
      background: #f8f9fa;
    }
    .message {
      margin-bottom: 15px;
      padding: 12px 16px;
      border-radius: 12px;
      max-width: 80%;
      word-wrap: break-word;
    }
    .user {
      background: #667eea;
      color: white;
      margin-left: auto;
      border-bottom-right-radius: 4px;
    }
    .assistant {
      background: white;
      color: #333;
      margin-right: auto;
      border-bottom-left-radius: 4px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .input-area {
      padding: 20px;
      background: white;
      border-top: 1px solid #e9ecef;
      display: flex;
      gap: 10px;
    }
    input[type="text"] {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e9ecef;
      border-radius: 25px;
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus {
      border-color: #667eea;
    }
    button {
      padding: 12px 30px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 25px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    .status {
      padding: 8px 20px;
      background: #fff3cd;
      color: #856404;
      font-size: 13px;
      text-align: center;
    }
    .status.healthy {
      background: #d4edda;
      color: #155724;
    }
    .typing {
      display: inline-block;
      padding: 5px 15px;
      background: #e9ecef;
      border-radius: 15px;
      font-size: 13px;
      color: #6c757d;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🐂🐎 牛马聊天测试</h1>
      <p>基于 nanobot 的客制化聊天界面</p>
    </div>
    
    <div class="status" id="status">检查服务状态...</div>
    
    <div class="chat-box" id="chatBox">
      <div class="message assistant">
        你好！我是牛马 🐂🐎，你的 AI 助手。有什么可以帮你的吗？
      </div>
    </div>
    
    <div class="input-area">
      <input 
        type="text" 
        id="input" 
        placeholder="输入消息..." 
        onkeypress="if(event.key==='Enter') sendMessage()"
      >
      <button onclick="sendMessage()" id="sendBtn">发送</button>
    </div>
  </div>

  <script>
    const API_BASE = 'http://localhost:8001';
    let sessionId = 'web:' + Math.random().toString(36).substr(2, 9);
    
    // 检查服务状态
    async function checkStatus() {
      try {
        const res = await fetch(`${API_BASE}/api/health`);
        const data = await res.json();
        const statusEl = document.getElementById('status');
        if (data.status === 'healthy') {
          statusEl.textContent = '✅ 服务正常 - ' + data.service;
          statusEl.className = 'status healthy';
        } else {
          statusEl.textContent = '⚠️ 服务异常';
        }
      } catch (e) {
        document.getElementById('status').textContent = '❌ 无法连接服务，请确保已启动：bash start.sh';
      }
    }
    
    // 添加消息到聊天框
    function addMessage(text, isUser) {
      const chatBox = document.getElementById('chatBox');
      const div = document.createElement('div');
      div.className = `message ${isUser ? 'user' : 'assistant'}`;
      div.textContent = text;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
    }
    
    // 发送消息
    async function sendMessage() {
      const input = document.getElementById('input');
      const sendBtn = document.getElementById('sendBtn');
      const message = input.value.trim();
      
      if (!message) return;
      
      // 添加用户消息
      addMessage(message, true);
      input.value = '';
      sendBtn.disabled = true;
      
      // 显示思考中
      const chatBox = document.getElementById('chatBox');
      const typing = document.createElement('div');
      typing.className = 'typing';
      typing.id = 'typing';
      typing.textContent = '牛马思考中...';
      chatBox.appendChild(typing);
      chatBox.scrollTop = chatBox.scrollHeight;
      
      try {
        const res = await fetch(`${API_BASE}/api/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message: message,
            session_id: sessionId
          })
        });
        
        const data = await res.json();
        
        // 移除思考提示
        const typingEl = document.getElementById('typing');
        if (typingEl) typingEl.remove();
        
        // 添加 AI 回复
        if (data.success) {
          addMessage(data.message, false);
        } else {
          addMessage('❌ 错误：' + (data.detail || '未知错误'), false);
        }
      } catch (e) {
        const typingEl = document.getElementById('typing');
        if (typingEl) typingEl.remove();
        addMessage('❌ 请求失败：' + e.message, false);
      } finally {
        sendBtn.disabled = false;
        input.focus();
      }
    }
    
    // 页面加载时检查状态
    checkStatus();
  </script>
</body>
</html>
